<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Summary</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="card">

    <div class="hero">
        <img src="download.jpg" alt="Music Image">
    </div>

    <div class="content">
        <h1>MUSIC SUMMARY</h1>

        <p>
            You can now listen to millions of songs,
            <i>audiobooks, and podcasts anywhere you like!</i>
        </p>

        <div class="plan-box">
            <div class="plan-info">
                <div class="icon"></div>

                <div>
                    <h3>Annual Plan</h3>
                    <span>$59.99/year</span>
                </div>
            </div>

            <a href="#">Change</a>
        </div>

        <button class="payment-btn">Proceed to Payment</button>
        <button class="cancel-btn">Cancel Order</button>

    </div>

</div>

</body>
</html>
